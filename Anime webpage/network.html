<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anime Universe - Global Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="anime-db.js"></script>

    <script>
        tailwind.config = { theme: { extend: { colors: { action: { DEFAULT: '#ff4d00', dark: '#cc3d00' } } } } }
    </script>
    <style>
        /* Base Settings */
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #050505; 
            color: #f1f1f1; 
            height: 100dvh; 
            width: 100vw; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        .font-bebas { font-family: 'Bebas Neue', sans-serif; }
        .no-select { user-select: none; -webkit-user-select: none; cursor: default; }
        
        /* Friend Cards */
        .friend-card { transition: 0.2s; cursor: pointer; border-left: 3px solid transparent; }
        .friend-card:hover, .friend-card.active { background: rgba(255,255,255,0.05); border-left-color: var(--action-color, #ff4d00); }
        
        /* Chat Bubbles */
        .chat-bubble { max-width: 75%; padding: 10px 14px; font-size: 13px; margin-bottom: 8px; position: relative; word-wrap: break-word; }
        .chat-bubble.me { background: #ff4d00; color: black; align-self: flex-end; border-radius: 12px 12px 0 12px; font-weight: 600; }
        .chat-bubble.them { background: #1a1a1a; color: white; align-self: flex-start; border-radius: 12px 12px 12px 0; border: 1px solid #333; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        
        /* MAILBOX STYLES */
        #mailbox-dropdown { transform-origin: top right; transition: all 0.2s ease; }
        .req-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02); }
        .req-btn { font-size: 9px; padding: 4px 8px; text-transform: uppercase; font-weight: bold; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .req-accept { background: rgba(34, 197, 94, 0.1); color: #22c55e; border-color: rgba(34, 197, 94, 0.2); }
        .req-accept:hover { background: #22c55e; color: black; }
        .req-decline { color: #ef4444; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            #chat-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 50; background: #050505; height: 100dvh; display: flex; flex-direction: column; }
            #messages-container { flex: 1; overflow-y: auto; padding-bottom: 10px; }
            #chat-form { flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
        }
    </style>
</head>
<body class="bg-[#050505] text-white">

    <header class="h-14 border-b border-gray-800 bg-black flex justify-between items-center px-4 md:px-6 shrink-0 z-30 relative no-select">
        <div class="flex items-center gap-4">
            <a href="dashboard.html" class="text-gray-500 hover:text-white transition cursor-pointer"><i class="fas fa-arrow-left"></i></a>
            <h1 class="text-2xl font-bebas tracking-widest text-white italic cursor-default">Anime <span class="text-action">Universe</span></h1>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="relative">
                <button onclick="toggleMailbox()" class="text-gray-400 hover:text-white relative p-2">
                    <i class="fas fa-envelope text-lg"></i>
                    <span id="notif-badge" class="absolute top-1 right-1 w-2.5 h-2.5 bg-action rounded-full border border-black hidden"></span>
                </button>
                <div id="mailbox-dropdown" class="hidden absolute right-0 mt-2 w-72 bg-[#090909] border border-white/10 shadow-2xl z-50 rounded-sm">
                    <div class="p-3 border-b border-white/10 flex justify-between items-center">
                        <h3 class="text-xs font-bold text-white uppercase tracking-widest">Incomming Comms</h3>
                        <span id="req-count" class="text-[9px] bg-white/10 px-2 py-0.5 rounded text-gray-400">0</span>
                    </div>
                    <div id="request-list" class="max-h-60 overflow-y-auto p-1 custom-scrollbar">
                        <div class="text-center py-4 text-[10px] text-gray-600">loading...</div>
                    </div>
                </div>
            </div>

            <div class="w-8 h-8 rounded-full bg-gray-800 border border-action flex items-center justify-center">
                <i class="fas fa-user-secret text-white"></i>
            </div>
        </div>
    </header>

    <div class="flex flex-1 relative overflow-hidden">
        <div id="sidebar-panel" class="w-full md:w-80 border-r border-gray-800 bg-black/50 flex flex-col h-full absolute md:static z-10">
            <div class="p-4 border-b border-gray-800 bg-black/20 no-select">
                <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 px-1">Comms Channels</h2>
                <button onclick="openSearchModal()" class="w-full bg-white/5 border border-white/10 text-gray-300 py-2 px-4 text-xs font-bold uppercase tracking-widest hover:bg-white/10 hover:text-white transition flex items-center justify-center gap-2">
                    <i class="fas fa-search"></i> Recruit Operative
                </button>
            </div>
            
            <div id="friends-list" class="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar">
                <div class="text-center text-xs text-gray-600 py-10">Initializing...</div>
            </div>
            
            <div class="p-3 bg-black/80 border-t border-gray-800 text-[9px] text-gray-600 text-center font-mono uppercase no-select">
                Squad Status: <span class="text-green-500">ONLINE</span>
            </div>
        </div>

        <div id="chat-panel" class="flex-1 flex flex-col bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] relative md:static bg-[#050505] transform translate-x-full md:translate-x-0 transition-transform duration-300">
            <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-gray-700 bg-black/90 md:bg-transparent z-0 no-select">
                <i class="fas fa-satellite-dish text-6xl mb-4 opacity-20"></i>
                <h3 class="text-xl font-bebas tracking-widest">Secure Line Standby</h3>
                <p class="text-xs font-mono">Select an Operative to establish comms.</p>
            </div>
            
            <div id="chat-interface" class="flex flex-col h-full hidden z-20 bg-black/95 backdrop-blur-sm w-full">
                <div class="h-14 border-b border-gray-800 bg-black/90 flex justify-between items-center px-4 md:px-6 shrink-0 no-select">
                    <div class="flex items-center gap-3">
                        <button onclick="closeChatMobile()" class="md:hidden text-gray-400 hover:text-white mr-1 p-2">
                            <i class="fas fa-chevron-left text-lg"></i>
                        </button>
                        <div class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_8px_#22c55e]"></div>
                        <div>
                            <h2 id="chat-partner-name" class="font-bold text-white uppercase tracking-widest text-sm">TARGET</h2>
                            <div class="text-[9px] text-gray-500 font-mono" id="chat-partner-clan">CLAN: UNKNOWN</div>
                        </div>
                    </div>
                    <button onclick="closeChat()" class="text-gray-500 hover:text-white hidden md:block"><i class="fas fa-times"></i></button>
                </div>
                
                <div id="messages-container" class="flex-1 overflow-y-auto p-4 flex flex-col gap-1"></div>

                <form id="chat-form" class="p-3 border-t border-gray-800 bg-black flex gap-3 shrink-0">
                    <input type="text" id="message-input" autocomplete="off" class="flex-1 bg-gray-900 border border-gray-700 rounded-full py-2 px-4 text-sm text-white focus:border-action focus:outline-none transition" placeholder="Message...">
                    <button type="submit" class="text-action text-xl hover:text-white transition px-2">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div id="searchModal" class="fixed inset-0 bg-black/90 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-[#090909] border border-white/20 w-full max-w-md p-6 relative shadow-2xl">
            <button onclick="document.getElementById('searchModal').classList.add('hidden')" class="absolute top-4 right-4 text-gray-500 hover:text-white"><i class="fas fa-times"></i></button>
            <h2 class="text-2xl font-bebas text-white mb-1 no-select">Recruit <span class="text-action">Operatives</span></h2>
            <p class="text-xs text-gray-500 font-mono mb-6 uppercase no-select">Search global database by username.</p>
            
            <div class="flex gap-2 mb-6">
                <input type="text" id="search-input" class="flex-1 bg-black border border-white/10 p-3 text-white text-sm focus:border-action outline-none" placeholder="Enter username...">
                <button onclick="performSearch()" class="bg-white/10 text-white px-5 font-bold uppercase text-xs hover:bg-white/20 border border-white/10">Scan</button>
            </div>

            <div id="search-results" class="space-y-2 max-h-60 overflow-y-auto custom-scrollbar"></div>
        </div>
    </div>

    <script>
        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        let currentChatPartner = null; 
        let chatInterval = null;

        document.addEventListener('DOMContentLoaded', () => {
            if(!currentUser) window.location.href = 'index.html';
            document.getElementById('my-username').innerText = currentUser.username;
            loadFriends();
            checkMailbox(); // CHECK FOR NEW MESSAGES ON LOAD
            setInterval(checkMailbox, 5000); // Poll every 5 seconds
            
            const setVH = () => {
                let vh = window.innerHeight * 0.01;
                document.documentElement.style.setProperty('--vh', `${vh}px`);
            };
            window.addEventListener('resize', setVH);
            setVH();
        });

        // --- MAILBOX LOGIC (NEW) ---
        function toggleMailbox() {
            const box = document.getElementById('mailbox-dropdown');
            box.classList.toggle('hidden');
            if(!box.classList.contains('hidden')) checkMailbox();
        }

        async function checkMailbox() {
            if(typeof dbGetPendingRequests === 'undefined') return;
            const requests = await dbGetPendingRequests(currentUser.email);
            
            const badge = document.getElementById('notif-badge');
            const countEl = document.getElementById('req-count');
            const list = document.getElementById('request-list');

            if (requests.length > 0) {
                badge.classList.remove('hidden');
                countEl.innerText = requests.length;
                list.innerHTML = '';
                requests.forEach(req => {
                    const senderName = req.sender ? req.sender.username : 'Unknown';
                    const senderClan = req.sender ? (req.sender.clan || 'Freelancer') : '---';
                    list.innerHTML += `
                    <div class="req-item" id="req-${req.id}">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-gray-800 flex items-center justify-center text-[10px] font-bold text-white border border-white/10">
                                ${senderName.substring(0,1).toUpperCase()}
                            </div>
                            <div>
                                <div class="text-xs font-bold text-white">${senderName}</div>
                                <div class="text-[9px] text-gray-500 font-mono">${senderClan}</div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="acceptReq(${req.id}, '${req.sender_email}')" class="req-btn req-accept"><i class="fas fa-check"></i></button>
                            <button onclick="declineReq(${req.id})" class="req-btn req-decline"><i class="fas fa-times"></i></button>
                        </div>
                    </div>`;
                });
            } else {
                badge.classList.add('hidden');
                countEl.innerText = "0";
                list.innerHTML = `<div class="text-center py-6 text-[10px] text-gray-600 uppercase tracking-widest">No Active Signals</div>`;
            }
        }

        async function acceptReq(id, senderEmail) {
            // Optimistic UI Removal
            document.getElementById(`req-${id}`).style.opacity = '0.5';
            await dbAcceptRequest(id, currentUser.email, senderEmail);
            checkMailbox();
            loadFriends(); // REFRESH FRIEND LIST IMMEDIATELY
        }

        async function declineReq(id) {
            document.getElementById(`req-${id}`).style.opacity = '0.5';
            await dbDeclineRequest(id);
            checkMailbox();
        }

        // --- MOBILE CHAT LOGIC ---
        function showChatPanelMobile() {
            document.getElementById('chat-panel').classList.remove('translate-x-full');
        }

        function closeChatMobile() {
            document.getElementById('chat-panel').classList.add('translate-x-full');
            clearInterval(chatInterval);
            currentChatPartner = null;
        }

        // --- LOAD FRIENDS ---
        async function loadFriends() {
            const list = document.getElementById('friends-list');
            try {
                if(typeof dbGetFriends === 'undefined') {
                    list.innerHTML = `<div class="text-center text-xs text-gray-500 mt-10">Database Offline</div>`;
                    return;
                }

                const friends = await dbGetFriends(currentUser.email);
                
                list.innerHTML = '';
                if(friends.length === 0) {
                    list.innerHTML = `
                        <div class="text-center py-8 px-4 no-select">
                            <i class="fas fa-user-slash text-gray-700 text-3xl mb-3"></i>
                            <p class="text-xs text-gray-500">No operatives in squad.</p>
                            <p class="text-[9px] text-gray-600 mt-1">Use "Recruit Operative" above.</p>
                        </div>`;
                    return;
                }

                friends.forEach(f => {
                    const html = `
                    <div onclick="openChat('${f.email}', '${f.username}', '${f.clan || 'Freelancer'}')" class="friend-card p-3 border-b border-white/5 flex items-center justify-between group no-select">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-gray-800 rounded flex items-center justify-center text-xs font-bold text-gray-400 group-hover:text-white border border-transparent group-hover:border-white/20 transition">
                                ${f.username.substring(0,2).toUpperCase()}
                            </div>
                            <div>
                                <div class="text-xs font-bold text-gray-300 group-hover:text-white transition uppercase">${f.username}</div>
                                <div class="text-[9px] text-gray-600 font-mono">Lvl ${f.level} • ${f.clan || 'No Clan'}</div>
                            </div>
                        </div>
                        <i class="fas fa-chevron-right text-[10px] text-gray-700 group-hover:text-action transition"></i>
                    </div>`;
                    list.innerHTML += html;
                });
            } catch(e) { console.error(e); }
        }

        // --- CHAT LOGIC ---
        function openChat(email, name, clan) {
            currentChatPartner = email;
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('chat-interface').classList.remove('hidden');
            showChatPanelMobile();
            document.getElementById('chat-partner-name').innerText = name;
            document.getElementById('chat-partner-clan').innerText = "CLAN: " + clan.toUpperCase();
            document.querySelectorAll('.friend-card').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            loadMessages();
            if(chatInterval) clearInterval(chatInterval);
            chatInterval = setInterval(loadMessages, 3000); 
        }

        function closeChat() {
            document.getElementById('chat-interface').classList.add('hidden');
            document.getElementById('empty-state').classList.remove('hidden');
            clearInterval(chatInterval);
            currentChatPartner = null;
            document.querySelectorAll('.friend-card').forEach(el => el.classList.remove('active'));
        }

        async function loadMessages() {
            if(!currentChatPartner) return;
            const msgs = await dbGetChatHistory(currentUser.email, currentChatPartner);
            const container = document.getElementById('messages-container');
            container.innerHTML = '';
            msgs.forEach(m => {
                const isMe = m.sender_email === currentUser.email;
                const bubble = `<div class="chat-bubble ${isMe ? 'me' : 'them'}">${m.content}</div>`;
                container.innerHTML += bubble;
            });
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if(!text || !currentChatPartner) return;
            const container = document.getElementById('messages-container');
            container.innerHTML += `<div class="chat-bubble me opacity-70">${text}</div>`;
            container.scrollTop = container.scrollHeight;
            input.value = '';
            await dbSendMessage(currentUser.email, currentChatPartner, text);
            loadMessages(); 
        });

        // --- SEARCH LOGIC (Updated to check Friend Status) ---
        function openSearchModal() { document.getElementById('searchModal').classList.remove('hidden'); }
        
        async function performSearch() {
            const query = document.getElementById('search-input').value;
            const resultsDiv = document.getElementById('search-results');
            resultsDiv.innerHTML = '<div class="text-xs text-gray-500 text-center py-4"><i class="fas fa-spinner fa-spin"></i> SCANNING...</div>';
            
            const users = await dbSearchUsers(query);
            resultsDiv.innerHTML = '';

            if(users.length === 0) {
                resultsDiv.innerHTML = '<div class="text-xs text-gray-500 text-center py-2">NO TARGETS FOUND</div>';
                return;
            }

            // Get friends to prevent re-adding
            const myFriends = await dbGetFriends(currentUser.email);
            const friendEmails = myFriends.map(f => f.email);

            users.forEach(u => {
                if(u.email === currentUser.email) return; 
                
                let btnHtml = '';
                if(friendEmails.includes(u.email)) {
                    btnHtml = `<span class="text-[9px] text-green-500 font-bold border border-green-500/20 px-2 py-1">ALLY</span>`;
                } else {
                    btnHtml = `<button onclick="addFriend('${u.email}')" class="bg-action text-black text-[9px] font-bold px-3 py-1.5 uppercase hover:bg-white transition action-skew"><i class="fas fa-plus"></i> Recruit</button>`;
                }

                resultsDiv.innerHTML += `
                <div class="p-3 bg-white/5 border border-white/5 flex justify-between items-center hover:border-action transition no-select">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-black rounded flex items-center justify-center text-[10px] font-bold text-gray-500">
                             ${u.username.substring(0,1).toUpperCase()}
                        </div>
                        <div>
                            <div class="font-bold text-white text-xs">${u.username}</div>
                            <div class="text-[9px] text-gray-500 uppercase">${u.clan || 'Freelancer'}</div>
                        </div>
                    </div>
                    ${btnHtml}
                </div>`;
            });
        }

        async function addFriend(email) {
            const btn = event.target.closest('button');
            btn.innerText = "...";
            const res = await dbSendFriendRequest(currentUser.email, email);
            if(res.error) { alert(res.error); btn.innerText = "FAILED"; }
            else {
                btn.innerText = "SENT";
                btn.className = "text-[9px] text-gray-500 font-bold border border-white/10 px-2 py-1";
            }
        }
    </script>
</body>
</html>
